<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(${pageTitle}, ~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="page-header">
        <div>
            <h4><i class="bi bi-person-plus me-2 text-primary"></i><span th:text="${pageTitle}"></span></h4>
        </div>
        <a th:href="@{/members}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Members
        </a>
    </div>

    <div class="card" style="max-width:680px">
        <div class="card-header" th:text="${pageTitle}"></div>
        <div class="card-body p-4">
            <form th:action="${member.id != null ? '/library/members/' + member.id + '/edit' : '/library/members/new'}"
                  th:object="${member}" method="post" novalidate>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Member ID <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{memberId}" class="form-control"
                               th:classappend="${#fields.hasErrors('memberId')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{memberId}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="Full name"/>
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" th:field="*{email}" class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="email@example.com"/>
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="text" th:field="*{phone}" class="form-control" placeholder="10-digit number"/>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <textarea th:field="*{address}" class="form-control" rows="2" placeholder="Member address"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Membership Start</label>
                        <input type="date" th:field="*{membershipDate}" class="form-control"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Membership Expiry</label>
                        <input type="date" th:field="*{membershipExpiry}" class="form-control"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Active</label>
                        <div class="form-check form-switch mt-1">
                            <input type="checkbox" th:field="*{active}" class="form-check-input" role="switch"/>
                            <label class="form-check-label">Member is active</label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy me-1"></i>Save Member
                    </button>
                    <a th:href="@{/members}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</th:block>
</body>
</html>
