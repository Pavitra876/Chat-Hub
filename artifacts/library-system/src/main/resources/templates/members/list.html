<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Members', ~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="page-header">
        <div>
            <h4><i class="bi bi-people me-2 text-primary"></i>Members</h4>
            <small class="text-muted" th:text="${#lists.size(members)} + ' member(s) found'"></small>
        </div>
        <a th:href="@{/members/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Register Member
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <form th:action="@{/members}" method="get" class="d-flex gap-2 search-bar">
                <input type="text" name="search" class="form-control form-control-sm"
                       placeholder="Search name, email, member ID…" th:value="${search}"/>
                <button class="btn btn-outline-primary btn-sm" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <a th:if="${search}" th:href="@{/members}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-x"></i>
                </a>
            </form>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(members)}" class="text-center text-muted py-5">
                <i class="bi bi-people" style="font-size:2rem"></i>
                <p class="mt-2 mb-0">No members found.</p>
            </div>
            <table th:unless="${#lists.isEmpty(members)}" class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="ps-3">Member ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Joined</th>
                        <th>Expires</th>
                        <th>Status</th>
                        <th class="pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="member : ${members}">
                        <td class="ps-3"><code th:text="${member.memberId}"></code></td>
                        <td class="fw-medium" th:text="${member.name}"></td>
                        <td th:text="${member.email}"></td>
                        <td th:text="${member.phone}"></td>
                        <td th:text="${member.membershipDate}"></td>
                        <td>
                            <span th:text="${member.membershipExpiry}"
                                  th:class="${!member.membershipValid} ? 'text-danger' : ''"></span>
                        </td>
                        <td>
                            <span th:if="${member.membershipValid}" class="badge badge-available">Active</span>
                            <span th:unless="${member.membershipValid}" class="badge badge-overdue">Expired</span>
                        </td>
                        <td class="pe-3">
                            <a th:href="@{/members/{id}/edit(id=${member.id})}"
                               class="btn btn-outline-primary btn-action me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/members/{id}/delete(id=${member.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Remove this member?')">
                                <button class="btn btn-outline-danger btn-action">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
