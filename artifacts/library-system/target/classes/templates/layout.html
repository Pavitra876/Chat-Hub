<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — LibraryMS'">LibraryMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        :root { --sidebar-w: 240px; --brand: #1d4ed8; --brand-dark: #1e3a8a; }
        body { background: #f1f5f9; min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-w); min-height: 100vh; position: fixed; top: 0; left: 0;
            background: linear-gradient(180deg, #1e3a8a 0%, #1d4ed8 100%);
            color: #fff; z-index: 100; display: flex; flex-direction: column;
        }
        .sidebar .brand { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar .brand h5 { font-weight: 700; letter-spacing: 0.5px; margin: 0; }
        .sidebar .brand small { opacity: 0.7; font-size: 0.75rem; }
        .sidebar nav { padding: 1rem 0; flex: 1; }
        .sidebar .nav-link { color: rgba(255,255,255,0.75); padding: 0.6rem 1.25rem;
            border-radius: 0; display: flex; align-items: center; gap: 0.6rem;
            font-size: 0.9rem; transition: all 0.15s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff; background: rgba(255,255,255,0.15); }
        .sidebar .nav-link i { font-size: 1rem; width: 20px; text-align: center; }
        .main-content { margin-left: var(--sidebar-w); padding: 2rem; }
        .page-header { background: #fff; border-radius: 12px; padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem; display: flex; align-items: center;
            justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .page-header h4 { margin: 0; font-weight: 700; color: #1e293b; }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .card-header { background: #fff; border-bottom: 1px solid #e2e8f0;
            font-weight: 600; color: #1e293b; padding: 1rem 1.25rem; border-radius: 12px 12px 0 0 !important; }
        .stat-card { border-radius: 12px; padding: 1.25rem; color: #fff; }
        .stat-card .number { font-size: 2rem; font-weight: 700; line-height: 1; }
        .stat-card .label { font-size: 0.8rem; opacity: 0.85; margin-top: 0.25rem; }
        .badge-available { background: #dcfce7; color: #166534; }
        .badge-issued { background: #dbeafe; color: #1e40af; }
        .badge-overdue { background: #fee2e2; color: #991b1b; }
        .badge-returned { background: #f1f5f9; color: #475569; }
        .table th { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: #64748b; font-weight: 600; background: #f8fafc; }
        .btn-action { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
        .alert { border-radius: 10px; border: none; }
        .form-label { font-weight: 500; font-size: 0.875rem; color: #374151; }
        .form-control, .form-select { border-radius: 8px; border-color: #e2e8f0; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
        .search-bar { max-width: 320px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand">
        <h5><i class="bi bi-book-half me-2"></i>LibraryMS</h5>
        <small>Management System</small>
    </div>
    <nav>
        <a th:href="@{/}" th:classappend="${activePage == 'dashboard'} ? 'active'" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a th:href="@{/books}" th:classappend="${activePage == 'books'} ? 'active'" class="nav-link">
            <i class="bi bi-journals"></i> Books
        </a>
        <a th:href="@{/members}" th:classappend="${activePage == 'members'} ? 'active'" class="nav-link">
            <i class="bi bi-people"></i> Members
        </a>
        <a th:href="@{/issues}" th:classappend="${activePage == 'issues'} ? 'active'" class="nav-link">
            <i class="bi bi-arrow-left-right"></i> Issue / Return
        </a>
    </nav>
    <div class="p-3" style="border-top:1px solid rgba(255,255,255,0.15); font-size:0.75rem; opacity:0.6;">
        MCA Java Project &copy; 2024
    </div>
</div>

<div class="main-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <th:block th:replace="${content}"/>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
