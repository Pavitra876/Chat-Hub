<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Books', ~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="page-header">
        <div>
            <h4><i class="bi bi-journals me-2 text-primary"></i>Books</h4>
            <small class="text-muted" th:text="${#lists.size(books)} + ' book(s) found'"></small>
        </div>
        <a th:href="@{/books/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Add Book
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <form th:action="@{/books}" method="get" class="d-flex gap-2 search-bar">
                <input type="text" name="search" class="form-control form-control-sm"
                       placeholder="Search title, author, ISBN…" th:value="${search}"/>
                <button class="btn btn-outline-primary btn-sm" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <a th:if="${search}" th:href="@{/books}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-x"></i>
                </a>
            </form>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(books)}" class="text-center text-muted py-5">
                <i class="bi bi-journals" style="font-size:2rem"></i>
                <p class="mt-2 mb-0">No books found.</p>
            </div>
            <table th:unless="${#lists.isEmpty(books)}" class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="ps-3">#</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>ISBN</th>
                        <th>Category</th>
                        <th>Year</th>
                        <th>Copies</th>
                        <th>Status</th>
                        <th class="pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book, stat : ${books}">
                        <td class="ps-3 text-muted" th:text="${stat.count}"></td>
                        <td class="fw-medium" th:text="${book.title}"></td>
                        <td th:text="${book.author}"></td>
                        <td><code th:text="${book.isbn}"></code></td>
                        <td>
                            <span th:if="${book.category}" class="badge bg-light text-dark border"
                                  th:text="${book.category}"></span>
                        </td>
                        <td th:text="${book.year}"></td>
                        <td>
                            <span th:text="${book.availableCopies} + '/' + ${book.totalCopies}"></span>
                        </td>
                        <td>
                            <span th:if="${book.available}" class="badge badge-available">Available</span>
                            <span th:unless="${book.available}" class="badge badge-overdue">Unavailable</span>
                        </td>
                        <td class="pe-3">
                            <a th:href="@{/books/{id}/edit(id=${book.id})}"
                               class="btn btn-outline-primary btn-action me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this book?')">
                                <button class="btn btn-outline-danger btn-action">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
