<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Issue Book', ~{::content})}">
<body>
<th:block th:fragment="content">
    <div class="page-header">
        <div>
            <h4><i class="bi bi-arrow-right-circle me-2 text-primary"></i>Issue Book to Member</h4>
        </div>
        <a th:href="@{/issues}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card" style="max-width:560px">
        <div class="card-header">Select Book and Member</div>
        <div class="card-body p-4">
            <form th:action="@{/issues/new}" method="post">
                <div class="mb-3">
                    <label class="form-label">Book <span class="text-danger">*</span></label>
                    <select name="bookId" class="form-select" required>
                        <option value="">— Choose a book —</option>
                        <th:block th:each="book : ${books}">
                            <option th:value="${book.id}"
                                    th:text="${book.title} + ' by ' + ${book.author} + ' (' + ${book.availableCopies} + ' avail.)'"
                                    th:disabled="${!book.available}">
                            </option>
                        </th:block>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label">Member <span class="text-danger">*</span></label>
                    <select name="memberId" class="form-select" required>
                        <option value="">— Choose a member —</option>
                        <th:block th:each="member : ${members}">
                            <option th:value="${member.id}"
                                    th:text="${member.memberId} + ' — ' + ${member.name}"
                                    th:disabled="${!member.membershipValid}">
                            </option>
                        </th:block>
                    </select>
                    <div class="form-text">Loan period: 14 days. Fine: ₹2/day after due date.</div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-arrow-right-circle me-1"></i>Issue Book
                    </button>
                    <a th:href="@{/issues}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</th:block>
</body>
</html>
